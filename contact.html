<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">g(OLD)</a>
    <div class="ms-auto">
      <a class="nav-link d-inline text-white me-3" href="index.html">Home</a>
      <a class="nav-link d-inline text-white me-3" href="cart.html">Cart</a>

      <a class="nav-link d-inline text-white" href="contact.html">Contact</a>
    </div>

</nav>

<div class="container my-5">

    <h2 class="text-center">Contact Us</h2>

    <form class="w-50 mx-auto mt-4">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control">
        </div>

        <div class="mb-3">
            <label>Message</label>
            <textarea class="form-control"></textarea>
        </div>

        <button type="button" class="btn btn-dark w-100"
                onclick="alert('Message sent!')">
            Send
        </button>
    </form>

</div>
