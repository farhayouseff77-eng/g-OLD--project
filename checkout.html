<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">g(OLD)</a>
    <div class="ms-auto">
      <a class="nav-link d-inline text-white me-3" href="index.html">Home</a>
      <a class="nav-link d-inline text-white me-3" href="cart.html">Cart</a>
      <a class="nav-link d-inline text-white me-3" href="about.html">About</a>
      <a class="nav-link d-inline text-white" href="contact.html">Contact</a>
    </div>

  </div>
</nav>

<div class="container my-5">

    <h2 class="text-center mb-4">Checkout</h2>

    <form class="w-50 mx-auto">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" required>
        </div>

        <button type="button" class="btn btn-dark w-100" onclick="placeOrder()">
            Confirm Order
        </button>

    </form>

</div>

<script src="script.js"></script>

<script>
function placeOrder() {
    alert("Order placed successfully 🎉");

    localStorage.removeItem("cart");

    window.location.href = "index.html";
}
</script>

</body>
</html>
